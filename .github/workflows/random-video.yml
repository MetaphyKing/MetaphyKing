name: Update Random Video Banner

on:
  schedule:
    - cron: '0 */6 * * *'    # every 6 hours — change if you want
  workflow_dispatch:         # allows manual run from GitHub UI

# This is the critical line that fixes exit code 128
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update random video in README
        run: python update_video.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rotate random video banner"
            git push
          fi
